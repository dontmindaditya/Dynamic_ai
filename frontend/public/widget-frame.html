<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #111; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #e5e7eb;
      background: #fff; flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 10px; }
    #avatar {
      width: 32px; height: 32px; border-radius: 50%; background: #2563EB;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #agent-name { font-size: 14px; font-weight: 600; color: #111; }
    #agent-status { font-size: 11px; color: #6b7280; }
    #close-btn {
      background: none; border: none; cursor: pointer; color: #6b7280;
      padding: 4px; border-radius: 6px; display: flex; align-items: center;
    }
    #close-btn:hover { background: #f3f4f6; color: #111; }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
    }
    .msg {
      max-width: 82%; padding: 10px 14px; border-radius: 14px;
      font-size: 13px; line-height: 1.5; word-break: break-word;
    }
    .msg.user {
      align-self: flex-end; background: #2563EB; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start; background: #f3f4f6; color: #111;
      border-bottom-left-radius: 4px;
    }
    .msg.error {
      align-self: flex-start; background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca;
    }
    .dots span {
      display: inline-block; width: 5px; height: 5px; background: #9ca3af;
      border-radius: 50%; margin: 0 1px; animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }
    #input-area {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 12px 16px; border-top: 1px solid #e5e7eb;
      background: #fff; flex-shrink: 0;
    }
    #input {
      flex: 1; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 10px 14px; font-size: 13px; font-family: inherit;
      color: #111; resize: none; outline: none; max-height: 120px;
      overflow-y: auto; line-height: 1.5; transition: border-color 0.15s;
    }
    #input:focus { border-color: #2563EB; }
    #input::placeholder { color: #9ca3af; }
    #send-btn {
      width: 38px; height: 38px; border-radius: 10px; background: #2563EB;
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.15s;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #e5e7eb; cursor: not-allowed; }
    #powered-by {
      text-align: center; font-size: 10px; color: #9ca3af; padding: 6px;
    }
    #powered-by a { color: #9ca3af; text-decoration: none; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <div id="avatar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div>
      <div id="agent-name">AI Agent</div>
      <div id="agent-status">Online</div>
    </div>
  </div>
  <button id="close-btn" onclick="closeWidget()" aria-label="Close">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<div id="messages">
  <div class="msg agent">Hi! How can I help you today?</div>
</div>

<div id="input-area">
  <textarea
    id="input"
    placeholder="Type a message..."
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()" aria-label="Send">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<div id="powered-by">
  Powered by <a href="https://fairquanta.ai" target="_blank">FairQuanta</a>
</div>

<script>
  var API_BASE  = "https://api.fairquanta.ai";
  var params    = new URLSearchParams(window.location.search);
  var agentId   = params.get("agentId") || "";
  var apiKey    = params.get("apiKey")  || "";
  var isLoading = false;
  var msgCount  = 0;

  function closeWidget() {
    window.parent.postMessage("fq:close", "*");
  }

  async function sendMessage() {
    var input = document.getElementById("input");
    var text  = input.value.trim();
    if (!text || isLoading || !agentId) return;

    appendMessage(text, "user");
    input.value = "";
    autoResize(input);

    var thinkingId = appendThinking();
    isLoading = true;
    document.getElementById("send-btn").disabled = true;

    try {
      var res = await fetch(API_BASE + "/v1/agents/" + agentId + "/run", {
        method:  "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
        body:    JSON.stringify({ message: text }),
      });

      removeMessage(thinkingId);

      if (!res.ok) {
        var err = await res.json().catch(function() { return {}; });
        appendMessage(err.detail || "Something went wrong. Please try again.", "error");
        return;
      }

      var data   = await res.json();
      var output = data.output || {};
      var reply  = output.answer   || output.response || output.result ||
                   output.email    || output.summary  || output.message ||
                   JSON.stringify(output, null, 2);

      appendMessage(String(reply), "agent");

    } catch (e) {
      removeMessage(thinkingId);
      appendMessage("Network error. Please check your connection.", "error");
    } finally {
      isLoading = false;
      document.getElementById("send-btn").disabled = false;
    }
  }

  function appendMessage(text, role) {
    var id  = "msg-" + (++msgCount);
    var div = document.createElement("div");
    div.className = "msg " + role;
    div.id = id;
    div.textContent = text;
    document.getElementById("messages").appendChild(div);
    scrollBottom();
    return id;
  }

  function appendThinking() {
    var id  = "msg-" + (++msgCount);
    var div = document.createElement("div");
    div.className = "msg dots";
    div.id = id;
    div.innerHTML = "<span></span><span></span><span></span>";
    document.getElementById("messages").appendChild(div);
    scrollBottom();
    return id;
  }

  function removeMessage(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    var el = document.getElementById("messages");
    el.scrollTop = el.scrollHeight;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
</script>
</body>
</html>
